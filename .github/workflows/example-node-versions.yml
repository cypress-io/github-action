name: example-node-versions
on:
  push:
    branches:
      - 'master'
  pull_request:
  workflow_dispatch:
permissions:
  contents: read

jobs:
  cypress-run:
    runs-on: ubuntu-24.04
    # let's make sure Cypress works on several versions of Node
    strategy:
      fail-fast: false
      matrix:
        node:
          - 22
          - 24
          - 26
    name: Cypress E2E on Node v${{ matrix.node }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Install Node.js
        uses: actions/setup-node@v7
        with:
          node-version: ${{ matrix.node }}
      - run: node -v
      - run: npm -v

      - name: Cypress tests
        uses: ./ # if copying, replace with cypress-io/github-action@v7
        with:
          working-directory: examples/node-versions
